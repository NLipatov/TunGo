name: Main Workflow
on:
  push:
    branches:
      - main
    paths:
      - 'src/**'   # Only if src directory files changed
  pull_request:
    branches:
      - main
    paths:
      - 'src/**'   # Only if src directory files changed

env:
  GO_VERSION: '1.26.0'
  GOTOOLCHAIN: 'local'

jobs:
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Get repository code
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
          submodules: 'recursive'

      - name: Setup Go
        uses: actions/setup-go@v6.5.0
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install dependencies
        run: |
          cd src
          go mod tidy

      - name: Run tests with coverage
        run: |
          cd src
          # preserve env so sudo uses the same Go toolchain
          sudo --preserve-env=PATH,GOROOT,GOTOOLCHAIN \
            env GOTOOLCHAIN=local \
            go test -coverprofile=coverage.txt ./...

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: src/coverage.txt
          flags: unittests
          fail_ci_if_error: true

  cross-compile-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: arm64
    steps:
      - name: Get repository code
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
          submodules: 'recursive'

      - name: Setup Go
        uses: actions/setup-go@v6.5.0
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cross-compile test packages (${{ matrix.goos }}/${{ matrix.goarch }})
        run: |
          cd src
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 \
            go test -run '^$' -exec /usr/bin/true ./...

  version-and-tag:
    runs-on: ubuntu-latest
    needs: [run-tests, cross-compile-tests]
    if: github.event_name == 'push' # Prevents this job from running in PR. It will only run on push to main.
    concurrency:
      group: ${{ github.workflow }}-version-and-tag-${{ github.ref }}
      cancel-in-progress: false
    outputs:
      semver: ${{ steps.gitversion.outputs.majorMinorPatch }}
    steps:
      - name: Get repository code
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
          submodules: 'recursive'

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v4.5.0
        with:
          versionSpec: '6.8.x'

      - name: Generate Version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v4.5.0

      - name: Tag and Push Version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.gitversion.outputs.majorMinorPatch }}"
          git tag "$VERSION"
          git push origin "$VERSION"
